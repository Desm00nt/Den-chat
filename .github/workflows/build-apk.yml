name: Build Den Chat APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip if needed
        run: |
          if ls *.zip 1>/dev/null 2>&1; then
            unzip -o *.zip -d temp_folder
            shopt -s dotglob
            mv temp_folder/*/* . 2>/dev/null || mv temp_folder/* . 2>/dev/null || true
            rm -rf temp_folder *.zip
          fi

      - name: List project files
        run: ls -la

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install project dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor packages
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest
          npm install @capacitor/android@latest

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set version code from run number
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          # Use GitHub run number as versionCode for auto-increment
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${VERSION_CODE}"
          
          # Update versionCode
          sed -i "s/versionCode [0-9]*/versionCode ${VERSION_CODE}/" $BUILD_GRADLE
          # Update versionName
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" $BUILD_GRADLE
          
          echo "📦 Version: ${VERSION_NAME} (code: ${VERSION_CODE})"

      - name: Create network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">0.peerjs.com</domain>
                  <domain includeSubdomains="true">peerjs.com</domain>
                  <domain includeSubdomains="true">global.stun.twilio.com</domain>
                  <domain includeSubdomains="true">stun.l.google.com</domain>
                  <domain includeSubdomains="true">openrelay.metered.ca</domain>
              </domain-config>
          </network-security-config>
          XMLEOF

      - name: Create file_paths.xml
        run: |
          cat > android/app/src/main/res/xml/file_paths.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="my_images" path="." />
              <cache-path name="my_cache_images" path="." />
              <files-path name="my_files" path="." />
          </paths>
          XMLEOF

      - name: Update AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          cat > $MANIFEST << 'MANIFESTEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
          
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:networkSecurityConfig="@xml/network_security_config"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
          
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:exported="true"
                      android:label="@string/title_activity_main"
                      android:launchMode="singleTask"
                      android:name=".MainActivity"
                      android:theme="@style/AppTheme.NoActionBar">
          
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
          
                  </activity>
          
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
          
              </application>
          </manifest>
          MANIFESTEOF

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK exists
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully!"
            ls -lh $APK_PATH
          else
            echo "❌ APK not found!"
            find android -name "*.apk" 2>/dev/null
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DenChat-v1.0.${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
